<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSupportBD - AI Emergency Help</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-gray-800 border-b border-red-500/30 p-4 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-red-500 tracking-wide">🛡️ CyberSupportBD</h1>
            <span class="bg-red-500/10 text-red-400 text-xs px-2.5 py-1 rounded-full border border-red-500/20 font-mono animate-pulse">AI Incident Responder</span>
        </div>
    </header>

    <!-- Main Container -->
    <main class="flex-1 max-w-4xl w-full mx-auto p-4 flex flex-col gap-4 overflow-hidden">
        
        <!-- Emergency Warning Banner -->
        <div class="bg-yellow-950/40 border border-yellow-600/40 rounded-lg p-3 text-sm text-yellow-300 flex items-center gap-2">
            <span>⚠️</span>
            <p><strong>Emergency:</strong> If you are facing active blackmail, <strong>do not delete chats</strong>. Take screenshots immediately.</p>
        </div>

        <!-- Quick Help Buttons -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
            <button onclick="sendQuickHelp('My Facebook account is hacked')" class="bg-gray-800 hover:bg-gray-700 p-2.5 rounded-lg border border-gray-700 text-xs font-medium text-center transition">Hacked Account</button>
            <button onclick="sendQuickHelp('Someone is blackmailing me with my pictures')" class="bg-gray-800 hover:bg-red-950/40 p-2.5 rounded-lg border border-red-900/50 text-xs font-medium text-center text-red-300 transition">Online Blackmail</button>
            <button onclick="sendQuickHelp('I lost money to an online bkash/nagad scam')" class="bg-gray-800 hover:bg-gray-700 p-2.5 rounded-lg border border-gray-700 text-xs font-medium text-center transition">Financial Scam</button>
            <button onclick="sendQuickHelp('How to file a report with Bangladesh Cyber Police?')" class="bg-gray-800 hover:bg-gray-700 p-2.5 rounded-lg border border-gray-700 text-xs font-medium text-center transition">Legal / BD Police</button>
        </div>

        <!-- Chat Window -->
        <div id="chat-window" class="flex-1 bg-gray-950 rounded-xl p-4 overflow-y-auto border border-gray-800 space-y-4 max-h-[50vh] sm:max-h-[60vh]">
            <!-- System Greeting -->
            <div class="flex gap-3 max-w-[85%]">
                <div class="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center text-sm shrink-0">AI</div>
                <div class="bg-gray-800 rounded-2xl rounded-tl-none p-3 text-sm shadow-md">
                    Assalamu Alaikum. I am your CyberSupportBD automated emergency assistant. How can I help secure your digital space today?
                </div>
            </div>
        </div>

        <!-- Settings Box (For API Key) -->
        <div class="bg-gray-800/50 p-2 rounded-lg border border-gray-800 flex gap-2 items-center">
            <input type="password" id="api-key" placeholder="Paste your OpenAI API Key here to chat..." class="flex-1 bg-gray-900 border border-gray-700 rounded px-2 py-1 text-xs focus:outline-none focus:border-red-500">
            <a href="https://openai.com" target="_blank" class="text-[10px] text-gray-400 underline">Get Key</a>
        </div>

        <!-- Input Bar -->
        <div class="flex gap-2">
            <input type="text" id="user-input" placeholder="Describe your cyber security problem..." class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-red-500 placeholder-gray-500" onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()" class="bg-red-600 hover:bg-red-500 text-white font-medium px-6 py-3 rounded-xl text-sm transition shadow-lg shadow-red-900/20">Send</button>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
